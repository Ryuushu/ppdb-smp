name: CI-CD

on:
  push:
    branches: [ "main" ]

env:
  IMAGE_NAME: zauzj/ppdb-smp

jobs:

  # =========================
  # 1. BUILD & PUSH (CLOUD)
  # =========================
  build:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Generate Tag
      id: tag
      run: |
        TAG=$(git rev-parse --short HEAD)
        echo "tag=$TAG" >> $GITHUB_OUTPUT

    - name: Login Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Image
      run: docker build -t $IMAGE_NAME:${{ steps.tag.outputs.tag }} .

    - name: Push Image
      run: docker push $IMAGE_NAME:${{ steps.tag.outputs.tag }}

  # =========================
  # 2. DEPLOY (SELF-HOSTED)
  # =========================
  deploy:
    runs-on: self-hosted
    needs: build

    steps:
    - name: Deploy to K3s
      run: |
        export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

        kubectl set image deployment/laravel \
          laravel=$IMAGE_NAME:${{ needs.build.outputs.image_tag }} \
          -n default

        kubectl rollout status deployment/laravel -n default

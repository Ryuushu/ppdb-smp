name: CI-CD

on:
  push:
    branches: [ "main" ]

env:
  IMAGE_NAME: zauzj/ppdb-smp

jobs:

  # =========================
  # BUILD & PUSH
  # =========================
  build:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Generate Tag
      id: tag
      run: |
        TAG=$(git rev-parse --short HEAD)
        echo "tag=$TAG" >> $GITHUB_OUTPUT

    - name: Login Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # =========================
    # BUILD LARAVEL IMAGE
    # =========================
    - name: Build Laravel Image
      run: |
        docker build \
          -t $IMAGE_NAME:${{ steps.tag.outputs.tag }} \
          -f dockerfile/laravel/Dockerfile \
          .

    - name: Push Laravel Image
      run: |
        docker push $IMAGE_NAME:${{ steps.tag.outputs.tag }}

    # =========================
    # BUILD NGINX IMAGE
    # =========================
    - name: Build Nginx Image
      run: |
        docker build \
          -t $IMAGE_NAME-nginx:${{ steps.tag.outputs.tag }} \
          -f dockerfile/nginx/Dockerfile \
          .

    - name: Push Nginx Image
      run: |
        docker push $IMAGE_NAME-nginx:${{ steps.tag.outputs.tag }}

  # =========================
  # DEPLOY KE K3S
  # =========================
  deploy:
    runs-on: self-hosted
    needs: build

    steps:
    - name: Deploy to K3s
      run: |
        export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

        # Laravel deployment update
        kubectl set image deployment/laravel \
          laravel=$IMAGE_NAME:${{ needs.build.outputs.image_tag }} \
          -n default

        # Nginx deployment update
        kubectl set image deployment/nginx \
          nginx=$IMAGE_NAME-nginx:${{ needs.build.outputs.image_tag }} \
          -n default

        kubectl rollout status deployment/laravel -n default
        kubectl rollout status deployment/nginx -n default

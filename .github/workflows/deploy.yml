name: CI-CD

on:
  push:
    branches: [ "main" ]

env:
  IMAGE_NAME: zauzj/ppdb-smp

jobs:

  # =========================
  # BUILD & PUSH
  # =========================
  build:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Generate Tag
      id: tag
      run: |
        git fetch --tags
    
        LAST_TAG=$(git tag --sort=-v:refname | grep '^v' | head -n 1)
    
        echo "Last tag: $LAST_TAG"
    
        if [ -z "$LAST_TAG" ]; then
          NEW_TAG="v1.0.4"
        else
          VERSION=${LAST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
    
          PATCH=$((PATCH + 1))
          NEW_TAG="v$MAJOR.$MINOR.$PATCH"
        fi
    
        echo "New tag: $NEW_TAG"
    
        echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT

    - name: Login Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # =========================
    # BUILD LARAVEL IMAGE
    # =========================
    - name: Build Laravel Image
      run: |
        docker build \
          -t ${{ vars.IMAGE_NAME_LARAVEL }}:${{ steps.tag.outputs.tag }} \
          -f docker/laravel/Dockerfile \
          .

    - name: Push Laravel Image
      run: |
        docker push ${{ vars.IMAGE_NAME_LARAVEL }}:${{ steps.tag.outputs.tag }}

    # =========================
    # BUILD NGINX IMAGE
    # =========================
    - name: Build Nginx Image
      run: |
        docker build \
          -t ${{ vars.IMAGE_NAME_NGINX }}:${{ steps.tag.outputs.tag }} \
          -f docker/nginx/Dockerfile \
          .

    - name: Push Nginx Image
      run: |
        docker push ${{ vars.IMAGE_NAME_NGINX }}:${{ steps.tag.outputs.tag }}

  # =========================
  # DEPLOY KE K3S
  # =========================
  deploy:
    runs-on: self-hosted
    needs: build

    steps:
    - name: Deploy to K3s
      run: |
        export KUBECONFIG=/home/nixie/k3s.yaml

        # Laravel deployment update
        # Nginx deployment update
        kubectl set image deployment/nginx \
          nginx=${{ vars.IMAGE_NAME_NGINX }}:${{ needs.build.outputs.image_tag }} \
          -n app
          
        kubectl set image deployment/laravel \
          laravel=${{ vars.IMAGE_NAME_LARAVEL }}:${{ needs.build.outputs.image_tag }} \
          -n app

        
        kubectl rollout status deployment/nginx -n app
        kubectl rollout status deployment/laravel -n app
    - name: Run Migration Job
      run: |
        cat <<EOF | kubectl apply -f -
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: laravel-migrate-${{ needs.build.outputs.image_tag }}
          namespace: app
        spec:
          template:
            spec:
              containers:
              - name: laravel
                image: ${{ vars.IMAGE_NAME_LARAVEL }}:${{ needs.build.outputs.image_tag }}
                command: ["php", "artisan", "migrate", "--seed", "--force"]
              restartPolicy: Never
          backoffLimit: 1
        EOF

        kubectl wait --for=condition=complete job/laravel-migrate-${{ needs.build.outputs.image_tag }} -n app --timeout=120s

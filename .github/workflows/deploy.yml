name: CI-CD

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:

  # =========================
  # BUILD & PUSH
  # =========================
  build:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # =========================
    # GENERATE TAG
    # =========================
    - name: Generate Tag
      id: tag
      run: |
        git fetch --tags

        LAST_TAG=$(git tag --sort=-v:refname | grep '^v' | head -n 1)

        echo "Last tag: $LAST_TAG"

        if [ -z "$LAST_TAG" ]; then
          NEW_TAG="v1.0.4"
        else
          VERSION=${LAST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          PATCH=$((PATCH + 1))
          NEW_TAG="v$MAJOR.$MINOR.$PATCH"
        fi

        echo "New tag: $NEW_TAG"
        echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT

    # =========================
    # CREATE & PUSH TAG (WAJIB)
    # =========================
    - name: Create & Push Git Tag
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"

        git tag ${{ steps.tag.outputs.tag }} || echo "Tag exists"
        git push origin ${{ steps.tag.outputs.tag }} || echo "Already pushed"

    # =========================
    # LOGIN DOCKER
    # =========================
    - name: Login Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # =========================
    # BUILD & PUSH LARAVEL
    # =========================
    - name: Build Laravel Image
      run: |
        docker build \
          -t ${{ vars.IMAGE_NAME_LARAVEL }}:${{ steps.tag.outputs.tag }} \
          -f docker/laravel/Dockerfile \
          .

    # =========================
    # BUILD & PUSH NGINX
    # =========================
    - name: Build Nginx Image
      run: |
        docker build \
          -t ${{ vars.IMAGE_NAME_NGINX }}:${{ steps.tag.outputs.tag }} \
          -f docker/nginx/Dockerfile \
          .
          
    - name: Push Laravel Image
      run: |
        docker push ${{ vars.IMAGE_NAME_LARAVEL }}:${{ steps.tag.outputs.tag }}

    - name: Push Nginx Image
      run: |
        docker push ${{ vars.IMAGE_NAME_NGINX }}:${{ steps.tag.outputs.tag }}

  # =========================
  # DEPLOY KE K3S
  # =========================
  # =========================
  # DEPLOY VIA SSH PASSWORD
  # =========================
  deploy:
    runs-on: ubuntu-latest
    needs: build
  
    steps:
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass
  
      - name: Deploy to K3s Server (ALL sudo)
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh -o StrictHostKeyChecking=no \
          ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
  
          set -e
  
          export KUBECONFIG=/home/nixie/k3s.yaml
  
          echo "Deploy tag: ${{ needs.build.outputs.image_tag }}"
  
          # =========================
          # UPDATE IMAGE
          # =========================
          sudo kubectl set image deployment/nginx \
            nginx=${{ vars.IMAGE_NAME_NGINX }}:${{ needs.build.outputs.image_tag }} \
            -n app
  
          sudo kubectl set image deployment/laravel \
            laravel=${{ vars.IMAGE_NAME_LARAVEL }}:${{ needs.build.outputs.image_tag }} \
            -n app
  
          # =========================
          # ROLLOUT STATUS
          # =========================
          sudo kubectl rollout status deployment/nginx -n app --timeout=180s
          sudo kubectl rollout status deployment/laravel -n app --timeout=180s
  
          # =========================
          # MIGRATION JOB NAME
          # =========================
          SAFE_TAG=$(echo "${{ needs.build.outputs.image_tag }}" | tr '.' '-' | tr '[:upper:]' '[:lower:]')
          JOB_NAME="laravel-migrate-$SAFE_TAG"
  
          sudo kubectl delete job $JOB_NAME -n app --ignore-not-found
  
          # =========================
          # MIGRATION JOB
          # =========================
          cat <<YAML | sudo kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: $JOB_NAME
            namespace: app
          spec:
            ttlSecondsAfterFinished: 300
            backoffLimit: 1
            template:
              spec:
                containers:
                - name: laravel
                  image: ${{ vars.IMAGE_NAME_LARAVEL }}:${{ needs.build.outputs.image_tag }}
                  command: ["php", "artisan", "migrate", "--seed", "--force"]
                  envFrom:
                  - secretRef:
                      name: laravel-env
                  - secretRef:
                      name: mysql-secret
                restartPolicy: Never
          YAML
  
          sudo kubectl wait --for=condition=complete job/$JOB_NAME -n app --timeout=300s
  
          sudo kubectl logs job/$JOB_NAME -n app
  
          EOF

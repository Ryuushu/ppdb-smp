name: CI-CD

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:

  # =========================
  # BUILD & PUSH
  # =========================
  build:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # =========================
    # GENERATE TAG
    # =========================
    - name: Generate Tag
      id: tag
      run: |
        git fetch --tags

        LAST_TAG=$(git tag --sort=-v:refname | grep '^v' | head -n 1)

        echo "Last tag: $LAST_TAG"

        if [ -z "$LAST_TAG" ]; then
          NEW_TAG="v1.0.4"
        else
          VERSION=${LAST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          PATCH=$((PATCH + 1))
          NEW_TAG="v$MAJOR.$MINOR.$PATCH"
        fi

        echo "New tag: $NEW_TAG"
        echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT

    # =========================
    # CREATE & PUSH TAG (WAJIB)
    # =========================
    - name: Create & Push Git Tag
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"

        git tag ${{ steps.tag.outputs.tag }} || echo "Tag exists"
        git push origin ${{ steps.tag.outputs.tag }} || echo "Already pushed"

    # =========================
    # LOGIN DOCKER
    # =========================
    - name: Login Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # =========================
    # BUILD & PUSH LARAVEL
    # =========================
    - name: Build Laravel Image
      run: |
        docker build \
          -t ${{ vars.IMAGE_NAME_LARAVEL }}:${{ steps.tag.outputs.tag }} \
          -f docker/laravel/Dockerfile \
          .

    - name: Push Laravel Image
      run: |
        docker push ${{ vars.IMAGE_NAME_LARAVEL }}:${{ steps.tag.outputs.tag }}

    # =========================
    # BUILD & PUSH NGINX
    # =========================
    - name: Build Nginx Image
      run: |
        docker build \
          -t ${{ vars.IMAGE_NAME_NGINX }}:${{ steps.tag.outputs.tag }} \
          -f docker/nginx/Dockerfile \
          .

    - name: Push Nginx Image
      run: |
        docker push ${{ vars.IMAGE_NAME_NGINX }}:${{ steps.tag.outputs.tag }}

  # =========================
  # DEPLOY KE K3S
  # =========================
  deploy:
    runs-on: self-hosted
    needs: build

    steps:
    - name: Deploy + Migration
      run: |
        export KUBECONFIG=/home/nixie/k3s.yaml

        echo "Deploy tag: ${{ needs.build.outputs.image_tag }}"

        # =========================
        # UPDATE IMAGE
        # =========================
        kubectl set image deployment/nginx \
          nginx=${{ vars.IMAGE_NAME_NGINX }}:${{ needs.build.outputs.image_tag }} \
          -n app

        kubectl set image deployment/laravel \
          laravel=${{ vars.IMAGE_NAME_LARAVEL }}:${{ needs.build.outputs.image_tag }} \
          -n app

        # =========================
        # WAIT ROLLOUT
        # =========================
        kubectl rollout status deployment/nginx -n app --timeout=180s
        kubectl rollout status deployment/laravel -n app --timeout=180s

        # =========================
        # PREPARE JOB NAME
        # =========================
        SAFE_TAG=$(echo "${{ needs.build.outputs.image_tag }}" | tr '.' '-' | tr '[:upper:]' '[:lower:]')
        JOB_NAME="laravel-migrate-$SAFE_TAG"
        kubectl get secret mysql-secret -n infra -o yaml \
        | sed '/resourceVersion\|uid\|creationTimestamp\|managedFields/d' \
        | sed 's/namespace: infra/namespace: app/' \
        | kubectl apply -f -
        
        # =========================
        # DELETE OLD JOB
        # =========================
        kubectl delete job $JOB_NAME -n app --ignore-not-found
        
        # =========================
        # RUN MIGRATION JOB
        # =========================
        cat <<EOF | kubectl apply -f -
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: $JOB_NAME
          namespace: app
        spec:
          ttlSecondsAfterFinished: 300
          backoffLimit: 1
          template:
            spec:
              containers:
              - name: laravel
                image: ${{ vars.IMAGE_NAME_LARAVEL }}:${{ needs.build.outputs.image_tag }}
                command: ["php", "artisan", "migrate", "--seed", "--force"]
                envFrom:
                - secretRef:
                    name: laravel-env
                - secretRef:
                    name: mysql-secret
              restartPolicy: Never
        EOF
        
        # =========================
        # WAIT MIGRATION
        # =========================
        kubectl wait \
          --for=condition=complete \
          job/$JOB_NAME \
          -n app \
          --timeout=300s
        
        # =========================
        # DEBUG LOG (kalau gagal)
        # =========================
        kubectl logs job/$JOB_NAME -n app

name: CI-CD

on:
  push:
    branches: [ "main" ]

env:
  IMAGE_NAME: zauzj/ppdb-smp

jobs:

  # =========================
  # BUILD & PUSH
  # =========================
  build:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Generate Tag
      id: tag
      run: |
        git fetch --tags
    
        LAST_TAG=$(git tag --sort=-v:refname | grep '^v' | head -n 1)
    
        if [ -z "$LAST_TAG" ]; then
          NEW_TAG="v1.0.4"
        else
          VERSION=${LAST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
    
          PATCH=$((PATCH + 1))
          NEW_TAG="v$MAJOR.$MINOR.$PATCH"
        fi
    
        echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT

    - name: Login Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # =========================
    # BUILD LARAVEL IMAGE
    # =========================
    - name: Build Laravel Image
      run: |
        docker build \
          -t $IMAGE_NAME_LARAVEL:${{ steps.tag.outputs.tag }} \
          -f docker/laravel/Dockerfile \
          .

    - name: Push Laravel Image
      run: |
        docker push $IMAGE_NAME_LARAVEL:${{ steps.tag.outputs.tag }}

    # =========================
    # BUILD NGINX IMAGE
    # =========================
    - name: Build Nginx Image
      run: |
        docker build \
          -t $IMAGE_NAME_NGINX:${{ steps.tag.outputs.tag }} \
          -f docker/nginx/Dockerfile \
          .

    - name: Push Nginx Image
      run: |
        docker push $IMAGE_NAME_NGINX:${{ steps.tag.outputs.tag }}

  # =========================
  # DEPLOY KE K3S
  # =========================
  deploy:
    runs-on: self-hosted
    needs: build

    steps:
    - name: Deploy to K3s
      run: |
        export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

        # Laravel deployment update
        kubectl set image deployment/laravel \
          laravel=$IMAGE_NAME_LARAVEL:${{ needs.build.outputs.image_tag }} \
          -n default

        # Nginx deployment update
        kubectl set image deployment/nginx \
          nginx=$IMAGE_NAME_NGINX:${{ needs.build.outputs.image_tag }} \
          -n default

        kubectl rollout status deployment/laravel -n default
        kubectl rollout status deployment/nginx -n default
